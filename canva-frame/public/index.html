<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="./icon.png" />
    <title>Canva Çerçeve Üretici</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Canva Çerçeve Üretici</h1>
      <p class="subtitle">Şeffaf arka planlı PNG yükle, çerçeveye dönüştür</p>

      <div class="drop-zone" id="dropZone">
        <div class="drop-content" id="dropContent">
          <div class="drop-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                d="M12 16.5V9.75m0 0l3 3m-3-3l-3 3M6.75 19.5a4.5 4.5 0 01-1.41-8.775 5.25 5.25 0 0110.233-2.33 3 3 0 013.758 3.848A3.752 3.752 0 0118 19.5H6.75z"
              />
            </svg>
          </div>
          <div class="drop-label">PNG dosyasını seç veya sürükle</div>
          <div class="drop-hint">Sadece saydam .png formatı</div>
        </div>

        <div class="preview-container hidden" id="previewContainer">
          <img id="imagePreview" src="" alt="Önizleme" />
          <div class="preview-overlay">
            <span>Değiştirmek için tıkla veya sürükle</span>
          </div>
        </div>

        <input type="file" name="resim" id="fileInput" accept="image/png" />
      </div>

      <div class="file-info" id="fileInfo">
        <svg
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 12.75L11.25 15 15 9.75M21 12a9 9 0 11-18 0 9 9 0 0118 0z"
          />
        </svg>
        <span id="fileName"></span>
      </div>

      <button id="submitBtn" disabled>
        <svg
          id="spinnerIcon"
          class="animate-spin hidden"
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="none"
        >
          <circle
            cx="12"
            cy="12"
            r="10"
            stroke="currentColor"
            stroke-width="3"
            stroke-opacity="0.25"
          ></circle>
          <path
            fill="currentColor"
            d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
          ></path>
        </svg>
        <span id="btnText">Oluştur ve İndir</span>
      </button>

      <div class="hata" id="hataKutusu">
        <svg
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"
          />
        </svg>
        <span id="hataMetni"></span>
      </div>
      <div class="signature">
        <svg
          fill="none"
          stroke="currentColor"
          viewBox="0 0 24 24"
          stroke-width="2"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M17.25 6.75L22.5 12l-5.25 5.25m-10.5 0L1.5 12l5.25-5.25m7.5-3l-4.5 16.5"
          />
        </svg>
        <span>aytugzn</span>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
